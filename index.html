<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Centro de Control de Eventos Campus Villa V3.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="login-badge">V3.0</div>
      <h1>Centro de Control de Eventos</h1>
      <p>Campus Villa</p>
      <input id="passwordInput" type="password" placeholder="Ingrese contraseña" />
      <button onclick="login()">Ingresar</button>
      <small>Contraseña inicial: <b>villa2026</b></small>
    </div>
  </div>

  <main id="app" class="hidden">
    <header class="header">
      <section>
        <div class="eyebrow">Dashboard Ejecutivo Premium</div>
        <h1>Centro de Control de Eventos</h1>
        <p>Campus Villa · Vista mensual y semanal</p>
      </section>

      <section class="header-actions">
        <div class="clock">
          <span id="currentDate"></span>
          <strong id="currentTime"></strong>
        </div>
        <button class="secondary" onclick="goToday()">Hoy</button>
        <button class="danger" onclick="logout()">Salir</button>
      </section>
    </header>

    <section class="toolbar">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="monthTitle"></h2>
        <button onclick="changeMonth(1)">▶</button>
      </div>

      <div class="view-switch">
        <button id="btnMonth" class="active" onclick="setView('month')">Mensual</button>
        <button id="btnWeek" onclick="setView('week')">Semanal</button>
      </div>
    </section>

    <section class="filters">
      <input id="searchInput" placeholder="Buscar por OT, evento o requerimiento..." oninput="render()" />
      <select id="areaFilter" onchange="render()">
        <option value="">Todas las áreas</option>
      </select>
      <select id="estadoFilter" onchange="render()">
        <option value="">Todos los estados</option>
      </select>
      <select id="categoriaFilter" onchange="render()">
        <option value="">Todas las categorías</option>
      </select>
    </section>

    <section class="kpis">
      <article class="kpi blue"><span id="kpiTotal">0</span><small>Eventos</small></article>
      <article class="kpi green"><span id="kpiDone">0</span><small>Ejecutados</small></article>
      <article class="kpi amber"><span id="kpiPending">0</span><small>Pendientes</small></article>
      <article class="kpi red"><span id="kpiHigh">0</span><small>Prioridad alta</small></article>
      <article class="kpi purple"><span id="kpiHoliday">0</span><small>Feriados Perú</small></article>
    </section>

    <section class="legend">
      <span><i class="legend-dot alta"></i>Alta</span>
      <span><i class="legend-dot media"></i>Media</span>
      <span><i class="legend-dot baja"></i>Baja</span>
      <span><i class="legend-dot feriado"></i>Feriado</span>
      <span><i class="legend-dot today"></i>Hoy</span>
    </section>

    <section id="calendar" class="calendar"></section>
  </main>

  <div id="eventModal" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="eyebrow">Eventos del día</div>
          <h2 id="modalDate"></h2>
          <p id="modalInfo"></p>
        </div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>

      <div id="eventScroll" class="event-scroll"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
